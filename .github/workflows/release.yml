name: Release

# Runs on every push to main. When unreleased changesets are present, the action opens a
# "Version Packages" PR. Merging that PR (another push to main) publishes to npm and creates
# the matching GitHub Release.
on:
  push:
    branches:
      - main

# Avoid two releases racing if pushes land back to back.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create release commits, tags, and GitHub Releases
  pull-requests: write # open / update the Version Packages PR
  id-token: write # mint the OIDC token npm uses to attach provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the GitHub changelog generator can link commits.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # setup-node writes the auth-token .npmrc that `changeset publish` reads, and provides a
      # recent npm CLI for provenance generation.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
