name: CI

# The release safety net: lint, the full test suite, and a real build of every
# example (including the scaffold) must pass before anything publishes. Runs on
# pull requests for contributor feedback and is reused by release.yml via
# workflow_call so a push to main can't publish without going green first.
on:
  pull_request:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Two passes: the repo's own tsconfig (src + tests under strict), then the
      # consumer probe — shipped raw TS under the scaffolded app tsconfig plus
      # noUncheckedIndexedAccess, so a strict consumer flag can't break a release.
      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # Building the examples resolves every public import path against the
      # package exports map, so a moved/renamed export (the kind that ships a
      # broken scaffold) fails CI instead of npm publish.
      - name: Build scaffold example
        run: bun run --filter scaffold build

      - name: Build kitchen-sink example
        run: bun run --filter kitchen-sink build

  # The front door, exercised end to end against the packed tarball — the
  # exact artifact npm would publish. Scaffold an app with the packed CLI,
  # install the tarball into it, build, boot, and curl a page + an rpc.
  # Catches what the in-repo example builds can't: a template pinning a stale
  # framework version, or the published file set missing something the
  # scaffold needs.
  scaffold-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Pack @belte/belte
        run: cd packages/belte && bun pm pack --destination "$RUNNER_TEMP"

      - name: Scaffold an app from the packed artifact
        run: |
          TARBALL="$(echo "$RUNNER_TEMP"/belte-belte-*.tgz)"
          mkdir "$RUNNER_TEMP/consumer"
          cd "$RUNNER_TEMP/consumer"
          echo '{"name":"consumer","private":true}' > package.json
          bun add "$TARBALL"
          # --no-install: the pinned version may not be published yet; the
          # build step below installs from the packed tarball instead.
          ./node_modules/.bin/belte scaffold my-app --no-install

      # The scaffold must pin the framework version that scaffolded it — a
      # stale pin installs a framework the docs don't describe.
      - name: Assert the scaffold pins the packed version
        run: |
          cd "$RUNNER_TEMP/consumer/my-app"
          PIN="$(bun -e 'console.log((await Bun.file("package.json").json()).dependencies["@belte/belte"])')"
          EXPECTED="^$(bun -e 'console.log((await Bun.file(process.env.GITHUB_WORKSPACE + "/packages/belte/package.json").json()).version)')"
          echo "pin=$PIN expected=$EXPECTED"
          test "$PIN" = "$EXPECTED"

      # Point the dependency at the tarball so the build exercises the packed
      # artifact rather than whatever the registry currently serves. The pinned
      # version isn't published yet (this run is what publishes it), so overwrite
      # the dependency with a file: ref to the tarball outright — `bun add`-ing
      # the tarball alongside the existing semver pin makes bun read the two
      # same-named entries as a self-loop (DependencyLoop).
      - name: Build the scaffolded app from the tarball
        run: |
          cd "$RUNNER_TEMP/consumer/my-app"
          BELTE_TARBALL="$(echo "$RUNNER_TEMP"/belte-belte-*.tgz)" \
            bun -e 'const p = await Bun.file("package.json").json(); p.dependencies["@belte/belte"] = "file:" + process.env.BELTE_TARBALL; await Bun.write("package.json", JSON.stringify(p, null, 4) + "\n")'
          bun install
          bun run build

      - name: Boot and curl the page and rpc
        run: |
          cd "$RUNNER_TEMP/consumer/my-app"
          PORT=4173 bun run start > server.log 2>&1 &
          SERVER_PID=$!
          for attempt in $(seq 1 50); do
            curl -fs "http://localhost:4173/__belte/identity" > /dev/null 2>&1 && break
            sleep 0.2
          done
          curl -fs "http://localhost:4173/__belte/identity" | grep -q '"belte":true'
          curl -fs "http://localhost:4173/" | grep -q "</html>"
          curl -fs "http://localhost:4173/rpc/getHello" | grep -q "Hello"
          kill "$SERVER_PID"
